name: Release

# Tag a version (e.g. `git tag v0.9.3 && git push --tags`) to build the plugin and
# publish a GitHub Release with the packaged latest.zip. The custom-repo manifest
# lives in greenteakitkats/DalamudPlugins, which regenerates itself from this release.
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.x

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dest = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile dalamud.zip
          Expand-Archive -Path dalamud.zip -DestinationPath $dest -Force

      - name: Build
        run: dotnet build -c Release --nologo

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/Release/HousingHistory/latest.zip
